name: software_lab
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  flutter_screenutil: ^5.9.3
  go_router: ^17.1.0
  smooth_page_indicator: ^1.1.0
  file_picker: ^10.3.10
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0
  equatable : 
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png"

flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: BeVientnam
      fonts:
        - asset: assets/fonts/BeVietnam-Regular.ttf
